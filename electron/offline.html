<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glo's Party Games — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 24px;
    }
    h1 { font-size: 2rem; letter-spacing: 0.2em; color: #ff00aa; }
    p { color: #666; font-size: 0.9rem; letter-spacing: 0.1em; }
    button {
      margin-top: 16px;
      background: #ff00aa;
      color: #000;
      border: none;
      padding: 12px 32px;
      font-family: inherit;
      font-size: 1rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #cc0088; }
  </style>
</head>
<body>
  <h1>CONNECTION LOST</h1>
  <p>CHECK YOUR INTERNET CONNECTION AND TRY AGAIN</p>
  <button onclick="window.location.href='https://party-games-api-server.vercel.app'">
    RECONNECT
  </button>
</body>
</html>
