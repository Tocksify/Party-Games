kind = "web"
previewPath = "/"
title = "Glo's Party Games"
version = "1.0.0"
id = "artifacts/glo-party-games"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24190

[services.development]
run = "pnpm --filter @workspace/glo-party-games run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/glo-party-games", "run", "build" ]
publicDir = "artifacts/glo-party-games/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24190"
BASE_PATH = "/"
